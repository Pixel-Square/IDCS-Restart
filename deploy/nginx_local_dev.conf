# Local development Nginx config
#
# Goal:
#   - Frontend accessible on http://127.0.0.1:80 (Nginx)
#   - Vite dev server runs on http://127.0.0.1:3001
#   - Django backend runs on http://127.0.0.1:8000
#   - /api/* proxied to Django, everything else proxied to Vite
#   - Supports Canva OAuth callback at: http://127.0.0.1:3001/api/canva/oauth/callback
#
# Usage (example):
#   sudo cp deploy/nginx_local_dev.conf /etc/nginx/sites-available/idcs-local
#   sudo ln -sf /etc/nginx/sites-available/idcs-local /etc/nginx/sites-enabled/idcs-local
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 127.0.0.1 localhost _;

    client_max_body_size 50M;

    # API -> Django
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Admin (optional) -> Django
    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8000;
    }

    # Everything else -> Vite
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # WebSocket/HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://127.0.0.1:3001;
    }
}
