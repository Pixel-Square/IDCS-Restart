# nginx site configuration for the IDCS app
# Place this in /etc/nginx/sites-available/idcs and symlink to sites-enabled

# ============================================================
# FRONTEND SITE: idcs.krgi.co.in
# Serves React frontend + API proxy
# ============================================================

server {
    listen 80;
    server_name idcs.krgi.co.in;

    # Cloudflare Tunnel currently forwards this hostname to local HTTP/80.
    # Serve the app here to avoid redirect loops. When the tunnel origin is
    # updated to HTTPS, this block can return to a simple 80 -> 443 redirect.
    # Baseline security headers for all responses.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /home/iqac/IDCS-Restart/frontend/build;
    index index.html;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 60s;

    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/frontend/build;
        default_type text/plain;
        try_files $uri =404;
    }

    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    location /assets/ {
        alias /home/iqac/IDCS-Restart/frontend/build/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        alias /home/iqac/IDCS-Restart/frontend/build/favicon.png;
        access_log off;
        expires 30d;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /canva.html {
        root /home/iqac/IDCS-Restart/frontend/build;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Resource-Policy  "cross-origin";
        add_header Cross-Origin-Embedder-Policy  "require-corp";
        add_header Cross-Origin-Opener-Policy    "same-origin";
    }
}

server {
    listen 443 ssl http2;
    server_name idcs.krgi.co.in;

    ssl_certificate /home/iqac/IDCS-Restart/.letsencrypt/config/live/idcs.krgi.co.in/fullchain.pem;
    ssl_certificate_key /home/iqac/IDCS-Restart/.letsencrypt/config/live/idcs.krgi.co.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Baseline security headers for all responses.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Frontend root directory
    root /home/iqac/IDCS-Restart/frontend/build;
    index index.html;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 60s;

    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/frontend/build;
        default_type text/plain;
        try_files $uri =404;
    }

    # Backend static files (Django admin, DRF, etc.)
    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Backend media files
    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    # Frontend assets (JS, CSS, images from React build)
    location /assets/ {
        alias /home/iqac/IDCS-Restart/frontend/build/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Serve favicon from frontend build
    location = /favicon.ico {
        alias /home/iqac/IDCS-Restart/frontend/build/favicon.png;
        access_log off;
        expires 30d;
    }

    # API endpoints - proxy to Django backend
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    # Admin panel - proxy to Django
    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    # Everything else - serve React frontend with HTML5 history mode
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Canva iframe panel — requires cross-origin isolation headers so the
    # Canva SDK can access SharedArrayBuffer and postMessage correctly.
    # Served as a static file; never falls back to index.html.
    location = /canva.html {
        root /home/iqac/IDCS-Restart/frontend/build;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Resource-Policy  "cross-origin";
        add_header Cross-Origin-Embedder-Policy  "require-corp";
        add_header Cross-Origin-Opener-Policy    "same-origin";
    }
}

# ============================================================
# BACKEND/DATABASE SITE: db.krgi.co.in
# Direct Django backend access (admin, API browser, etc.)
# ============================================================

server {
    listen 80;
    server_name db.krgi.co.in;

    # Cloudflare Tunnel currently forwards this hostname to local HTTP/80.
    # Serve the backend here to avoid redirect loops. When the tunnel origin is
    # updated to HTTPS, this block can return to a simple 80 -> 443 redirect.

    # Baseline security headers for all responses.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 60s;

    # ACME challenge support so `certbot --webroot` can validate db.krgi.co.in.
    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/frontend/build;
        default_type text/plain;
        try_files $uri =404;
    }

    # Backend static files (Django admin, DRF, etc.)
    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
