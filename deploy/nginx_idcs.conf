# nginx site configuration for the IDCS app
# Place this in /etc/nginx/sites-available/idcs and symlink to sites-enabled

# ============================================================
# FRONTEND SITE: idcs.krgi.co.in
# Serves React frontend + API proxy
# ============================================================
server {
    listen 80;
    server_name idcs.krgi.co.in;

    # Frontend root directory
    root /home/iqac/IDCS-Restart/frontend/build;
    index index.html;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 60s;

    # Backend static files (Django admin, DRF, etc.)
    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Backend media files
    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    # Frontend assets (JS, CSS, images from React build)
    location /assets/ {
        alias /home/iqac/IDCS-Restart/frontend/build/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Serve favicon from frontend build
    location = /favicon.ico {
        alias /home/iqac/IDCS-Restart/frontend/build/favicon.png;
        access_log off;
        expires 30d;
    }

    # API endpoints - proxy to Django backend
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    # Admin panel - proxy to Django
    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    # Everything else - serve React frontend with HTML5 history mode
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# ============================================================
# BACKEND/DATABASE SITE: db.krgi.co.in
# Direct Django backend access (admin, API browser, etc.)
# ============================================================
server {
    listen 80;
    server_name db.krgi.co.in;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 60s;

    # Backend static files (Django admin, DRF, etc.)
    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Backend media files
    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    # Serve favicon from backend staticfiles
    location = /favicon.ico {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/favicon.png;
        access_log off;
        expires 30d;
    }

    # Everything else - proxy to Django backend
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }
}
