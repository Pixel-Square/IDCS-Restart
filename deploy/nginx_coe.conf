# Nginx site configuration for the COE frontend
# Place this in /etc/nginx/sites-available/coe and symlink to sites-enabled

server {
    listen 80;
    server_name coe.krgi.co.in;

    # Cloudflare Tunnel forwards this hostname to local HTTP/80.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /home/iqac/IDCS-Restart/coe/dist;
    index index.html;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 300s;

    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/coe/dist;
        default_type text/plain;
        try_files $uri =404;
    }

    location /assets/ {
        alias /home/iqac/IDCS-Restart/coe/dist/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        alias /home/iqac/IDCS-Restart/coe/dist/favicon.png;
        access_log off;
        expires 30d;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# HTTPS block removed — Cloudflare Tunnel terminates TLS upstream.
# If you need local TLS, add a 443 server block with valid cert paths.
