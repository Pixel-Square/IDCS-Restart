# Nginx site configuration for the COE frontend at coe.zynix.us
# Cloudflare Tunnel (idcs-production) forwards coe.zynix.us to localhost:80
#
# Deploy:
#   sudo cp deploy/nginx_coe_zynix.conf /etc/nginx/sites-available/coe.zynix.us
#   sudo ln -s /etc/nginx/sites-available/coe.zynix.us /etc/nginx/sites-enabled/coe.zynix.us
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name coe.zynix.us;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /home/iqac2/IDCS-Restart/coe/dist;
    index index.html;

    client_max_body_size 50M;
    keepalive_timeout 65;
    send_timeout 300s;

    # Trust Cloudflare IP ranges
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.159.0.0/16;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    location /assets/ {
        alias /home/iqac2/IDCS-Restart/coe/dist/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        alias /home/iqac2/IDCS-Restart/coe/dist/favicon.png;
        access_log off;
        expires 30d;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }

    location /static/ {
        alias /home/iqac2/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /home/iqac2/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
